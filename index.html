<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    
    <!-- <h1>Arav's Calculator</h1> -->
    <!-- Maybe by default put the title inside the display and then when bttons re pressed it sholdgo like a placeholder -->

    <div id="calc-outline">
        <div id="display">Arav's CalC</div>
        <div id="button-container">
            <button id="clearBtn" class="calcBtn">Clear</button>
            <button id="operatorBtn" class="calcBtn">÷</button>
            <button class="calcBtn">7</button>
            <button class="calcBtn">8</button>
            <button class="calcBtn">9</button>
            <button id="operatorBtn" class="calcBtn">×</button>
            <button class="calcBtn">4</button>
            <button class="calcBtn">5</button>
            <button class="calcBtn">6</button>
            <button id="operatorBtn" class="calcBtn">–</button>
            <button class="calcBtn">1</button>
            <button class="calcBtn">2</button>
            <button class="calcBtn">3</button>
            <button id="operatorBtn" class="calcBtn">+</button>
            <button class="calcBtn">0</button>
            <button class="calcBtn">.</button>
            <button class="calcBtn"><b>⌫</b></button>
            <button id="ansBtn" class="calcBtn">=</button>
        </div>
    </div>

</body>
</html>
